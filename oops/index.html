<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="title" content="404 — Page Not Found |Page not found" />
    <meta
      name="description"
      content="The requested path could not be found. The page may have been moved, deleted, or never existed. A return to thePage not found dashboard is recommended."
    />
    <meta
      name="keywords"
      content="404 Error, Page Not Found, Error, System Error, Return to Dashboard"
    />
    <meta name="author" content="Shyam Sunder Kanth" />
    <meta name="robots" content="noindex, nofollow" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shyamkanth.github.io/oops/" />
    <meta property="og:title" content="404 — System Error | Page not found" />
    <meta
      property="og:description"
      content="Oops! The rhythm was interrupted. The page you are looking for is missing from the repository."
    />
    <meta
      property="og:image"
      content="https://shyamkanth.github.io/images/og-card.png"
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="404 — Path Not Found" />
    <meta
      name="twitter:description"
      content="The requested resource is unavailable. Please return to the main dashboard to continue your journey."
    />
    <meta
      name="twitter:image"
      content="https://shyamkanth.github.io/images/og-card.png"
    />

    <meta name="theme-color" content="#0d0f0e" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — System Error</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="/images/icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <style>
      .error-page {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        text-align: center;
        padding: 32px;
      }
      .error-content {
        max-width: 500px;
      }
      .error-icon-wrap {
        margin-bottom: 24px;
        display: inline-flex;
        padding: 20px;
        background: rgba(var(--accent-rgb), 0.05);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .error-icon-wrap .mi {
        font-size: 48px;
        color: var(--accent);
      }
      .error-title {
        font-size: 82px;
        font-family: var(--font-mono);
        font-weight: 800;
        letter-spacing: -2px;
        margin-bottom: 8px;
        background: linear-gradient(to bottom, var(--text), var(--text-muted));
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .error-subtitle {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 16px;
      }
      .error-desc {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 40px;
        font-family: var(--font-mono);
      }
      .btn-primary {
        width: 100%;
        justify-content: center;
        border-radius: 50px;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="error-content">
        <div class="error-icon-wrap">
          <span class="material-symbols-outlined mi">location_off</span>
        </div>
        <h1 class="error-title">404</h1>
        <h2 class="error-subtitle">Page Not Found</h2>
        <p class="error-desc">
          ERR: The path you are looking for has been moved, deleted, or never
          existed in the repository.
        </p>
        <button class="btn btn-primary" onclick="window.location.href = '/'">
          <span class="material-symbols-outlined mi">home</span>
          <span>Return to Dashboard</span>
        </button>
      </div>
    </div>
  </body>
</html>
