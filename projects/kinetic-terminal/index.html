<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Terminal - Professional Project Management</title>
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="./manifest.json">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div id="app">
        <header class="top-nav">
            <div class="top-nav-container">
                <div class="logo-section">
                    <div class="logo">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" opacity="0.3" />
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        <span class="logo-text">Kinetic Terminal</span>
                    </div>
                </div>

                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <input type="text" placeholder="Search tasks..." id="globalSearch" autocomplete="off">
                    <div id="searchResults" class="search-results-dropdown"></div>
                </div>

                <div class="top-nav-actions">

                <button class="icon-btn" id="settingsBtn" title="Settings">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <div class="app-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-header">
                        <div class="current-project-info" id="currentProjectInfo">
                            <div class="project-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path
                                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                                </svg>
                            </div>
                            <div class="project-info-text">
                                <div class="project-name" id="sidebarProjectName">Select Project</div>
                                <div class="project-key" id="sidebarProjectKey">---</div>
                            </div>
                        </div>
                        <button class="btn-icon-sm" id="switchProjectBtn" title="Switch Project">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="17 1 21 5 17 9" />
                                <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                                <polyline points="7 23 3 19 7 15" />
                                <path d="M21 13v2a4 4 0 0 1-4 4H3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <div class="nav-section">
                        <div class="nav-section-title">PLANNING</div>
                        <a href="#" class="sidebar-link" data-view="board">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="3" width="7" height="7" />
                                <rect x="14" y="3" width="7" height="7" />
                                <rect x="14" y="14" width="7" height="7" />
                                <rect x="3" y="14" width="7" height="7" />
                            </svg>
                            <span>Board</span>
                            <span class="sidebar-badge" id="boardBadge">0</span>
                        </a>
                        <a href="#" class="sidebar-link" data-view="backlog">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="8" y1="6" x2="21" y2="6" />
                                <line x1="8" y1="12" x2="21" y2="12" />
                                <line x1="8" y1="18" x2="21" y2="18" />
                                <line x1="3" y1="6" x2="3.01" y2="6" />
                                <line x1="3" y1="12" x2="3.01" y2="12" />
                                <line x1="3" y1="18" x2="3.01" y2="18" />
                            </svg>
                            <span>Backlog</span>
                            <span class="sidebar-badge" id="backlogBadge">0</span>
                        </a>
                        <a href="#" class="sidebar-link" data-view="matrix">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="3" width="8" height="8" />
                                <rect x="13" y="3" width="8" height="8" />
                                <rect x="13" y="13" width="8" height="8" />
                                <rect x="3" y="13" width="8" height="8" />
                                <line x1="2" y1="12" x2="22" y2="12" stroke-opacity="0.3"/>
                                <line x1="12" y1="2" x2="12" y2="22" stroke-opacity="0.3"/>
                            </svg>
                            <span>Matrix</span>
                        </a>
                        <a href="#" class="sidebar-link" data-view="timeline">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="12" y1="2" x2="12" y2="6" />
                                <line x1="12" y1="18" x2="12" y2="22" />
                                <line x1="4.93" y1="4.93" x2="7.76" y2="7.76" />
                                <line x1="16.24" y1="16.24" x2="19.07" y2="19.07" />
                                <line x1="2" y1="12" x2="6" y2="12" />
                                <line x1="18" y1="12" x2="22" y2="12" />
                                <line x1="4.93" y1="19.07" x2="7.76" y2="16.24" />
                                <line x1="16.24" y1="7.76" x2="19.07" y2="4.93" />
                            </svg>
                            <span>Timeline</span>
                        </a>
                    </div>

                    <div class="nav-section">
                        <div class="nav-section-title">DEVELOPMENT</div>
                        <a href="#" class="sidebar-link" data-view="issues">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="12" y1="8" x2="12" y2="12" />
                                <line x1="12" y1="16" x2="12.01" y2="16" />
                            </svg>
                            <span>Issues</span>
                            <span class="sidebar-badge" id="issuesBadge">0</span>
                        </a>
                        <a href="#" class="sidebar-link" data-view="reports">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M3 3v18h18" />
                                <path d="M18 17V9" />
                                <path d="M13 17V5" />
                                <path d="M8 17v-3" />
                            </svg>
                            <span>Reports</span>
                        </a>
                    </div>

                    <div class="nav-section">
                        <div class="nav-section-title">SETTINGS</div>
                        <a href="#" class="sidebar-link" data-view="activity">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                            </svg>
                            <span>Activity Log</span>
                        </a>
                        <a href="#" class="sidebar-link" data-view="backup">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                            <span>Backup & Restore</span>
                        </a>
                        <a href="#" class="sidebar-link" data-view="people">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                            </svg>
                            <span>People</span>
                        </a>
                        <a href="#" class="sidebar-link" data-view="shortcuts">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="2" y="4" width="20" height="16" rx="2" ry="2" />
                                <line x1="6" y1="8" x2="6" y2="8" />
                                <line x1="10" y1="8" x2="10" y2="8" />
                                <line x1="14" y1="8" x2="14" y2="8" />
                                <line x1="18" y1="8" x2="18" y2="8" />
                                <line x1="6" y1="12" x2="6" y2="12" />
                                <line x1="10" y1="12" x2="10" y2="12" />
                                <line x1="14" y1="12" x2="14" y2="12" />
                                <line x1="18" y1="12" x2="18" y2="12" />
                                <line x1="7" y1="16" x2="17" y2="16" />
                            </svg>
                            <span>Keyboard Shortcuts</span>
                        </a>
                        <a href="#" class="sidebar-link" data-view="settings">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="3" />
                                <path
                                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                            </svg>
                            <span>Settings</span>
                        </a>
                    </div>
                </nav>

                <div class="sidebar-footer">
                    <button class="btn btn-sm btn-secondary btn-full" id="switchProjectFooterBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        </svg>
                        Switch Project
                    </button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="main-container">
                <div id="contentArea"></div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="modal-overlay"></div>

    <!-- Project Selection Modal -->
    <div id="projectsModal" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2>Projects</h2>
                <div class="modal-header-actions">
                    <button class="btn btn-primary" id="createNewProjectBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        Create Project
                    </button>
                    <button class="btn-close" data-modal="projectsModal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <div id="projectList" class="project-list"></div>
            </div>
        </div>
    </div>

    <div id="projectFormModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="projectFormTitle">Create Project</h2>
                <button class="btn-close" data-modal="projectFormModal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <form id="projectForm">
                <div class="modal-body project-form-body">
                    <div class="form-group">
                        <label for="projectName">Project Name *</label>
                        <input type="text" id="projectName" placeholder="e.g., Mobile App Redesign" required>
                    </div>
                    <div class="form-group">
                        <label for="projectKey">Project Key *</label>
                        <input type="text" id="projectKey" placeholder="e.g., MAR" maxlength="10" required
                            pattern="[A-Z]+" title="Only uppercase letters">
                        <small>Short identifier (uppercase letters only)</small>
                    </div>
                    <div class="form-group">
                        <label for="projectDesc">Description</label>
                        <textarea id="projectDesc" rows="3" placeholder="Describe your project..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-modal="projectFormModal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Project</button>
                </div>
            </form>
        </div>
    </div>

    <div id="taskModal" class="side-panel">
        <div class="modal-content modal-xl">
            <div class="modal-header">
                <h2 id="taskModalTitle">Create Issue</h2>
                <button class="btn-close" data-modal="taskModal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <form id="taskForm">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group col-12">
                            <label for="taskTitle">Summary *</label>
                            <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-12">
                            <label for="taskDesc">Description</label>
                            <textarea id="taskDesc" rows="6"
                                placeholder="Add details, requirements, acceptance criteria..."></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-6">
                            <label for="taskType">Issue Type</label>
                            <select id="taskType" class="custom-select">
                                <option value="task">Task</option>
                                <option value="bug">Bug</option>
                                <option value="feature">Feature</option>
                                <option value="epic">Epic</option>
                            </select>
                        </div>
                        <div class="form-group col-6">
                            <label for="taskPriority">Priority</label>
                            <select id="taskPriority" class="custom-select">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-6">
                            <label for="taskStatus">Status</label>
                            <select id="taskStatus" class="custom-select">
                                <option value="backlog">Backlog</option>
                                <option value="todo" selected>To Do</option>
                                <option value="in-progress">In Progress</option>
                                <option value="in-review">In Review</option>
                                <option value="done">Done</option>
                            </select>
                        </div>
                        <div class="form-group col-6">
                            <label for="taskAssignee">Assignee</label>
                            <select id="taskAssignee" class="custom-select searchable-select" data-placeholder="Select Assignee">
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-6">
                            <label for="taskReporter">Reporter</label>
                            <select id="taskReporter" class="custom-select searchable-select" data-placeholder="Select Reporter">
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        <div class="form-group col-6">
                            <label for="taskSprint">Sprint</label>
                            <input type="text" id="taskSprint" placeholder="e.g., Sprint 24.2">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-6">
                            <label for="taskDueDate">Due Date</label>
                            <input type="date" id="taskDueDate">
                        </div>
                        <div class="form-group col-6">
                            <label for="taskEstimate">Story Points</label>
                            <input type="number" id="taskEstimate" min="0" max="100" placeholder="0">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-12">
                            <label for="taskTags">Labels (comma separated)</label>
                            <input type="text" id="taskTags" placeholder="backend, api, security">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-12">
                            <label for="taskDependency">Blocks (Task IDs)</label>
                            <select id="taskDependency" class="custom-select searchable-select" multiple data-placeholder="Search and select tasks...">
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-modal="taskModal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="taskFormSubmitBtn">Create Issue</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task Details Modal -->
    <div id="taskDetailsModal" class="modal">
        <div class="modal-content modal-xl task-details-modal">
            <div class="modal-header">
                <div class="task-details-header-info">
                    <span class="task-type-icon" id="detailTaskTypeIcon"></span>
                    <span class="task-id-large" id="detailTaskId"></span>
                </div>
                <div class="task-details-actions">
                    <button class="btn btn-sm btn-secondary" id="editTaskBtn">Edit</button>
                    <button class="btn btn-sm btn-danger" id="deleteTaskBtn">Delete</button>
                    <button class="btn-close" data-modal="taskDetailsModal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body task-details-body" id="taskDetailsContent">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <!-- Person Modal -->
    <div id="personModal" class="modal">
        <div class="modal-content modal-sm">
            <form id="personForm">
                <div class="modal-header">
                    <h3>Add Person</h3>
                    <button type="button" class="btn-close" data-modal="personModal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="personName">Full Name</label>
                        <input type="text" id="personName" required placeholder="e.g., Shyam Kanth">
                    </div>
                    <div class="form-group">
                        <label for="personEmail">Email Address</label>
                        <input type="email" id="personEmail" required placeholder="e.g., shyam@example.com">
                    </div>
                    <div class="form-group" id="personJoinedDateGroup">
                        <label for="personJoinedDate">Joined Date</label>
                        <input type="date" id="personJoinedDate">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-modal="personModal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="personFormSubmitBtn">Add Person</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./assets/js/storage.js"></script>
    <script src="./assets/js/activity.js"></script>
    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/views.js"></script>
    <script src="./assets/js/ui.js"></script>
</body>

</html>
