<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline - BreatheEasy</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#071026">
  <style>
    body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#071026;color:#cfeff1;font-family:Inter,Outfit,Arial,sans-serif}
    .offline-card{max-width:560px;padding:28px;border-radius:12px;background:rgba(255,255,255,0.02);text-align:center}
    .offline-card h1{margin:0 0 8px}
    .offline-card p{margin:0 0 16px}
    .offline-card a{color:#0fd9b6}
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>You're offline</h1>
    <p>It looks like you're not connected to the internet. You can still view cached content.</p>
    <p><a href="/">Return to the app</a></p>
  </div>
</body>
</html>
