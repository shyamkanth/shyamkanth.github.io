<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="title"
      content="Technical Blog & Insights — Shyam Sunder Kanth"
    />
    <meta
      name="description"
      content="Technical deep-dives, tutorials, and insights on Android development, Kotlin, and Angular are shared. Advanced architectural patterns and modern coding practices are explored."
    />
    <meta
      name="keywords"
      content="Android Development Blog, Kotlin Tutorials, Angular Architecture, Jetpack Compose Guide, RxJS Insights, Mobile App Engineering, Shyam Sunder Kanth Blog"
    />
    <meta name="author" content="Shyam Sunder Kanth" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://shyamkanth.github.io/blogs/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shyamkanth.github.io/blogs/" />
    <meta
      property="og:title"
      content="Technical Blog & Insights — Shyam Sunder Kanth"
    />
    <meta
      property="og:description"
      content="A collection of technical articles focused on Android and Angular development is maintained. Deep-dives into mobile engineering and web frameworks are provided."
    />
    <meta
      property="og:image"
      content="https://shyamkanth.github.io/images/og-card.png"
    />
    <meta property="og:site_name" content="Shyam Sunder Kanth Portfolio" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://shyamkanth.github.io/blogs/" />
    <meta
      name="twitter:title"
      content="Technical Blog & Insights — Shyam Sunder Kanth"
    />
    <meta
      name="twitter:description"
      content="Expert-level articles on Android, Kotlin, and Angular are shared. Technical knowledge is documented through deep-dives and tutorials."
    />
    <meta
      name="twitter:image"
      content="https://shyamkanth.github.io/images/og-card.png"
    />

    <meta name="theme-color" content="#3DDC84" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Shyam Sunder Kanth</title>
    <link rel="stylesheet" href="blog-style.css" />
    <link rel="icon" href="/images/icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
  </head>

  <body class="theme-android">
    <nav class="navbar">
      <div class="nav-container">
        <a class="nav-brand" href="/">
          <div class="brand-icon">
            <span class="material-symbols-outlined">terminal</span>
          </div>
          <span class="brand-name">SHYAM SUNDER KANTH</span>
        </a>
        <a href="/" class="nav-back">
          <span class="material-symbols-outlined">arrow_back</span>
          Back to Portfolio
        </a>
      </div>
    </nav>

    <main>
      <section class="blog-hero">
        <div class="container">
          <div class="blog-hero-content">
            <h1 class="blog-hero-title">
              Articles & <span class="highlight">Insights</span>
            </h1>
            <p class="blog-hero-subtitle">
              Technical deep-dives, tutorials, and thoughts on Android, Angular,
              and modern development
            </p>
          </div>
        </div>
      </section>

      <section class="blog-search-section">
        <div class="container-narrow">
          <div class="search-wrapper">
            <div class="search-icon-wrapper">
              <span class="material-symbols-outlined search-icon">search</span>
            </div>
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Search articles by title or tag..."
              autocomplete="off"
            />
            <button id="clearSearch" class="clear-btn" style="display: none">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </div>
      </section>

      <section class="blog-content">
        <div class="container">
          <div class="sort-section">
            <div class="sort-label">
              <span class="material-symbols-outlined sort-icon">sort</span>
              Sort By
            </div>
            <div class="sort-buttons-group">
              <button class="sort-btn active" data-sort="newest">
                <span class="material-symbols-outlined">arrow_downward</span>
                Newest
              </button>
              <button class="sort-btn" data-sort="oldest">
                <span class="material-symbols-outlined">arrow_upward</span>
                Oldest
              </button>
            </div>
          </div>

          <div class="tags-filter-wrapper">
            <div class="tags-filter-container">
              <button class="tag-filter-btn active" data-tag="all">
                <span class="tag-filter-dot"></span>
                All Articles
              </button>
              <div id="tagsContainer" class="tags-list"></div>
            </div>
            <button class="tag-scroll-btn" id="tagScrollBtn">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>

          <div id="blogsGrid" class="blogs-grid"></div>

          <div id="noResults" class="no-results" style="display: none">
            <span class="material-symbols-outlined no-results-icon"
              >article</span
            >
            <h3>No articles found</h3>
            <p>Try adjusting your search or filters</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-brand">
            <div class="brand-icon-small"></div>
            <span class="footer-brand-text">SHYAM.DEV © 2025</span>
          </div>
          <div class="footer-links">
            <a href="/" class="footer-link">Portfolio</a>
            <a
              href="https://github.com/shyamkanth"
              target="_blank"
              class="footer-link"
              >GitHub</a
            >
            <a
              href="https://www.linkedin.com/in/shyam-sunder-kanth/"
              target="_blank"
              class="footer-link"
              >LinkedIn</a
            >
          </div>
        </div>
      </div>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initializeBlogSystem();
      });
    </script>
    <script src="blog-system.js"></script>
    <script src="../notification.js"></script>
    <script src="../cabinet.min.js"></script>
  </body>
</html>
