<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcement - Shyam Sunder Kanth</title>
    <link rel="stylesheet" href="announcement-style.css" />
    <link rel="icon" href="/images/icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="announcement-system.js" defer></script>
    <script src="../cabinet.js" defer></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a class="nav-brand" href="/">
          <div class="brand-icon">
            <span class="material-symbols-outlined">terminal</span>
          </div>
          <span class="brand-name">SHYAM SUNDER KANTH</span>
        </a>
        <a href="/announcements/" class="nav-back">
          <span class="material-symbols-outlined">arrow_back</span>
          All Announcements
        </a>
      </div>
    </nav>

    <main id="main">
      <section class="article-container" style="margin-top: 100px">
        <article id="articleContent" class="article-content"></article>

        <aside class="article-sidebar">
          <div class="article-toc">
            <h3 class="toc-title">
              <span class="material-symbols-outlined">list</span>
              Contents
            </h3>
            <ul id="tocList" class="toc-list"></ul>
          </div>
        </aside>
      </section>

      <section class="related-articles">
        <div class="container">
          <h2 class="section-title">
            More <span class="highlight">Announcements</span>
          </h2>
          <div id="relatedArticlesGrid" class="related-grid"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-brand">
            <div class="brand-icon-small"></div>
            <span class="footer-brand-text">SHYAM.DEV © 2025</span>
          </div>
          <div class="footer-links">
            <a href="/" class="footer-link">Portfolio</a>
            <a
              href="https://github.com/shyamkanth"
              target="_blank"
              class="footer-link"
              >GitHub</a
            >
            <a
              href="https://www.linkedin.com/in/shyam-sunder-kanth/"
              target="_blank"
              class="footer-link"
              >LinkedIn</a
            >
          </div>
        </div>
      </div>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        loadAndRenderAnnouncement();
      });
    </script>
  </body>
</html>
